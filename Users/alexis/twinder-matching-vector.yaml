twinder_matching_vector:
  matching_vector_version: '1.0'
  vector_metadata:
    generated_from_profile_version: '2.2'
    score_scale: 0.0 to 1.0
    score_meaning:
      '0.0': very low signal
      '0.25': somewhat low signal
      '0.5': mixed, balanced, unclear, or context-dependent
      '0.75': somewhat high signal
      '1.0': very strong signal
    scoring_warning: Scores are fuzzy compatibility features, not objective measurements.
    overall_vector_confidence: high
    limitations:
    - Scores optimize matching, not truth.
    - Dating scores are intentionally conservative because selected mode is networking and user is in a relationship.
    - Symbolic answers are treated as flavor signals with limited confidence.
  intent_orientation:
    dating:
      score: 0.2
      confidence: high
      evidence:
      - User selected networking and said she does not want something too personal or sexual.
      - User is in a relationship and only open to connection.
      notes: Do not match as dating-forward; allow only organic, non-flirtatious connection.
    friendship:
      score: 0.65
      confidence: medium
      evidence:
      - User wants same-wavelength people and people with life experiences she can learn from.
      - Outdoor/adventure and curiosity patterns support friendship fit.
      notes: Secondary mode; useful when friendships are high-signal and not overly personal too fast.
    networking:
      score: 0.95
      confidence: high
      evidence:
      - User explicitly selected networking.
      - User is interested in what people are making, opportunities to make more money, and entrepreneurship.
      notes: Primary matching orientation.
    hackathon:
      score: 0.6
      confidence: medium
      evidence:
      - Builder/project history and AI product interests.
      - Networking mode may surface hackathon collaborators.
      notes: Good if framed as build/collaboration, not the main mode.
    collaboration:
      score: 0.85
      confidence: high
      evidence:
      - User is interested in what people are making and entrepreneurship.
      - External profile emphasizes fast building and AI side projects.
      notes: Very strong secondary mode.
  vibe_features:
    playfulness:
      score: 0.8
      confidence: high
      evidence:
      - Chaotic human framing.
      - Praying mantis answer has absurdist humor.
      notes: Playful, but in a sharp/dry way.
    earnestness:
      score: 0.8
      confidence: high
      evidence:
      - Interested in emotional growth.
      - Wants real mental wavelength and learning from others.
      notes: Serious underneath the chaos.
    emotional_intensity:
      score: 0.65
      confidence: medium
      evidence:
      - Red described as vital/lively.
      - Emotional growth is an explicit topic.
      notes: Intensity should be matched without making networking too personal.
    warmth:
      score: 0.7
      confidence: medium
      evidence:
      - External profile describes warm 1:1 energy.
      - Wants nonjudgmental same-wavelength connection.
      notes: Warmth is present but privacy-bounded.
    weirdness_or_niche_energy:
      score: 0.9
      confidence: high
      evidence:
      - Praying mantis companion.
      - Twinder, BuildLens, Climbing Wrapped, niche AI interests.
      notes: Usefully weird is a core signal.
    aesthetic_boldness:
      score: 0.75
      confidence: medium
      evidence:
      - Favorite color red for importance, vitality, liveliness.
      - Chaotic/adventure self-positioning.
      notes: Bold but not necessarily polished.
    theatricality:
      score: 0.65
      confidence: medium
      evidence:
      - Twinder agent conversations should feel slightly theatrical.
      - User likes chaotic multifaceted framing.
      notes: Light theatricality is useful; avoid overperforming.
  social_style_features:
    introversion_to_extroversion:
      score: 0.58
      confidence: medium
      evidence:
      - External profile suggests ambiverted and stronger 1:1.
      - Networking intent implies outward connection.
      notes: Slightly social/outward but not broad-group extroversion.
      scale_note: 0.0 = more introverted/private; 1.0 = more extroverted/socially outward
    directness:
      score: 0.78
      confidence: high
      evidence:
      - User states preferences and boundaries directly.
      - Strong opinions held loosely.
      notes: Direct but updateable.
    openness_to_spontaneity:
      score: 0.85
      confidence: high
      evidence:
      - Adventure/chaotic self-presentation.
      - History of non-default movement and projects.
      notes: High novelty and openness.
    privacy_preference:
      score: 0.82
      confidence: high
      evidence:
      - User explicitly does not want anything too personal or sexual.
      - Relationship context should be kept careful.
      notes: High privacy in networking/dating-adjacent contexts.
      scale_note: 0.0 = very open/public; 1.0 = very private/selective
    conflict_comfort:
      score: 0.48
      confidence: medium
      evidence:
      - Strong opinions held loosely supports debate.
      - External profile suggests conflict sensitivity and need for gentleness.
      notes: Comfortable with ideas disagreement, less comfortable with harsh interpersonal conflict.
      scale_note: 0.0 = avoids disagreement; 1.0 = comfortable with direct disagreement
  connection_preferences:
    wants_depth:
      score: 0.75
      confidence: high
      evidence:
      - Interested in emotional growth and how people work.
      - Wants same mental wavelength.
      notes: Depth matters, but should not become invasive early.
    wants_lightness:
      score: 0.72
      confidence: high
      evidence:
      - Praying mantis should be small, light, not demanding, and not too heavy.
      notes: Strong need for lightness and low-demand interaction.
    wants_stability:
      score: 0.45
      confidence: medium
      evidence:
      - Some grounding signals from emotional growth, but novelty/adventure remain stronger.
      notes: Stability is valued but not the defining matching feature.
    wants_novelty:
      score: 0.9
      confidence: high
      evidence:
      - Wants people with things she has never heard about or life experiences she can learn from.
      notes: Very high novelty appetite.
    drawn_to_ambition:
      score: 0.82
      confidence: high
      evidence:
      - Interested in opportunities to make more money and entrepreneurship.
      notes: Ambition works best when paired with curiosity and authenticity.
    drawn_to_emotional_intelligence:
      score: 0.78
      confidence: high
      evidence:
      - Interested in emotional growth and how people work.
      notes: Important, but should be handled with boundaries.
    drawn_to_playful_people:
      score: 0.72
      confidence: medium
      evidence:
      - Chaotic self-description and absurd animal answer.
      notes: Playful people who are still substantive.
    drawn_to_grounded_people:
      score: 0.62
      confidence: medium
      evidence:
      - Praying mantis preference for low-demand, independent presence.
      - External profile suggests grounding complements breadth.
      notes: Grounded/self-contained beats needy/heavy.
    drawn_to_intellectual_people:
      score: 0.88
      confidence: high
      evidence:
      - Same mental wavelength.
      - Interested in how people work and what people are making.
      notes: High intellectual curiosity preference.
  collaboration_features:
    builder_orientation:
      score: 0.9
      confidence: high
      evidence:
      - Interested in what people are making.
      - External profile emphasizes AI side projects.
      notes: Very strong builder signal.
    ideation_orientation:
      score: 0.9
      confidence: high
      evidence:
      - Repeated product concepts and synthesis requests.
      notes: Ideas and product framing are a core mode.
    execution_orientation:
      score: 0.68
      confidence: medium
      evidence:
      - Can generate structured artifacts and prototypes.
      - Known 70% sprint pattern suggests execution is strong but depth/follow-through can vary.
      notes: Good for fast prototypes; long execution may need complementary partner.
    design_taste_orientation:
      score: 0.65
      confidence: medium
      evidence:
      - Interest in aesthetics/style and product narrative.
      notes: Taste matters, but not the primary networking filter.
    technical_depth_orientation:
      score: 0.78
      confidence: medium
      evidence:
      - AI engineer/data science background.
      - Specific depth should be verified before public claims.
      notes: Strong technical signal, avoid overclaiming exact expertise.
    social_launch_orientation:
      score: 0.58
      confidence: medium
      evidence:
      - Networking and entrepreneurship interest.
      - May prefer 1:1 over broad performative promotion.
      notes: Likely benefits from collaborators with distribution/sales strength.
  communication_features:
    concise_to_expansive:
      score: 0.62
      confidence: medium
      evidence:
      - User gives concise corrections but asks for rich synthesis.
      notes: Can be concise in prompts, expansive in desired artifacts.
      scale_note: 0.0 = very concise; 1.0 = expansive/context-rich
    literal_to_metaphorical:
      score: 0.72
      confidence: high
      evidence:
      - Animal/color symbolism is central to onboarding.
      - User likes vibe/proxy matching.
      notes: Comfortable using metaphor as signal, as long as it is not overtreated as fact.
      scale_note: 0.0 = literal/practical; 1.0 = metaphorical/symbolic
    casual_to_polished:
      score: 0.35
      confidence: high
      evidence:
      - User prefers chaotic/multifaceted/non-corporate vibe.
      notes: More casual/raw than polished.
      scale_note: 0.0 = casual/raw; 1.0 = polished/formal
    emotionally_reserved_to_expressive:
      score: 0.62
      confidence: medium
      evidence:
      - Interested in emotional growth, but asks to avoid too-personal framing.
      notes: Expressive internally, selective externally.
      scale_note: 0.0 = emotionally reserved; 1.0 = emotionally expressive
  compatibility_axes:
    seriousness_match_importance:
      score: 0.75
      confidence: high
      evidence:
      - Networking and entrepreneurship goals are intentional.
      - Playfulness should not erase seriousness.
      notes: Needs people who can be playful and substantive.
    humor_match_importance:
      score: 0.68
      confidence: medium
      evidence:
      - Absurdist/praying mantis/chaotic self-presentation.
      notes: Humor helps filter same-wavelength people.
    intellectual_match_importance:
      score: 0.9
      confidence: high
      evidence:
      - Same mental wavelength and people with unfamiliar knowledge are explicit goals.
      notes: Core match axis.
    emotional_safety_importance:
      score: 0.82
      confidence: high
      evidence:
      - No personal/sexual framing.
      - Interest in emotional growth with boundaries.
      notes: Safety/boundaries are essential.
    ambition_match_importance:
      score: 0.82
      confidence: high
      evidence:
      - Entrepreneurship and money-making opportunities.
      notes: Ambition should be authentic, not status-gamey.
    aesthetic_taste_match_importance:
      score: 0.52
      confidence: medium
      evidence:
      - Red/chaotic/outdoorsy vibe matters but is secondary to networking value.
      notes: Taste helps vibe match but should not dominate.
    practical_utility_match_importance:
      score: 0.88
      confidence: high
      evidence:
      - Networking, money-making, entrepreneurship, what people are making.
      notes: Matches should have a reason to exist beyond vibes.
    novelty_match_importance:
      score: 0.9
      confidence: high
      evidence:
      - User wants people with things she has never heard about or life experiences she can learn from.
      notes: Very strong axis.
    outdoorsy_lifestyle_match_importance:
      score: 0.55
      confidence: medium
      evidence:
      - Outdoorsy/adventure is part of bio vibe.
      notes: Nice-to-have; not required for networking.
    boundary_respect_importance:
      score: 0.95
      confidence: high
      evidence:
      - User explicitly does not want too personal or sexual.
      notes: Critical safety and relevance filter.
  match_filters:
    strong_positive_filters:
    - AI builders
    - founders/operators
    - domain experts
    - people making interesting things
    - entrepreneurial thinkers
    - emotionally intelligent ambitious people
    - same-wavelength curiosity
    - unfamiliar life experience
    - strong opinions held loosely
    soft_positive_filters:
    - climbers/outdoorsy people
    - travel/non-default lives
    - dry humor
    - aesthetic weirdness
    - psychology interest
    negative_filters:
    - sexualized networking
    - too personal too fast
    - closed-mindedness
    - status games
    - generic credential-flexing
    - low curiosity
    - rigid certainty
    - dating-first framing
  privacy_and_safety_features:
    romantic_availability_publicness:
      score: 0.15
      confidence: high
      evidence:
      - User is in a relationship and selected networking.
      notes: Keep romantic availability mostly private; do not advertise.
    sexual_boundary_strictness:
      score: 0.95
      confidence: high
      evidence:
      - User explicitly said she does not want something too personal or too sexual.
      notes: Strong filter.
    personal_detail_selectiveness:
      score: 0.85
      confidence: high
      evidence:
      - User requested boundaries around personal/sexual content.
      notes: Use abstractions only.
    professional_publicness:
      score: 0.72
      confidence: medium
      evidence:
      - Networking mode and AI engineer bio.
      notes: Professional interests are public-safe, but exact claims should be verified.
    financial_specificity_publicness:
      score: 0.2
      confidence: high
      evidence:
      - Interest in making more money can be public-safe; specifics should remain private.
      notes: Talk about opportunity/entrepreneurship, not finances.
  mode_weighting_recommendation:
    networking: 0.95
    collaboration: 0.85
    friendship: 0.65
    hackathon: 0.6
    dating: 0.2
  top_match_archetypes:
  - name: AI founder/operator
    fit_score: 0.92
    why: Combines building, entrepreneurship, money/opportunity, and high-signal networking.
  - name: Domain expert with weird knowledge
    fit_score: 0.88
    why: Gives her unfamiliar worlds and potential AI application space.
  - name: Emotionally intelligent ambitious peer
    fit_score: 0.84
    why: Matches emotional growth interest without sacrificing drive.
  - name: Sales/distribution/business model person
    fit_score: 0.82
    why: Complements technical/product energy with money-making and go-to-market knowledge.
  - name: Outdoor builder / climber founder type
    fit_score: 0.76
    why: Combines adventure identity with building and curiosity.
  - name: Strange self-contained expert
    fit_score: 0.75
    why: 'Praying-mantis-compatible: independent, low-demand, precise, and interesting.'
  calibration_notes:
    raise_scores_when_match_has:
    - Specific thing they are building
    - clear business model insight
    - unusual life experience
    - AI or domain expertise
    - emotionally intelligent ambition
    - respect for boundaries
    - dry/weird humor
    - strong opinions held loosely
    lower_scores_when_match_has:
    - sexualized language
    - romantic pressure
    - generic networking
    - status signaling
    - closed-mindedness
    - no concrete curiosity
    - rigid certainty
    - no respect for privacy
    do_not_use_for_scoring:
    - Attractiveness
    - mental health stability
    - sexual behavior
    - financial worthiness
    - moral worth
    - diagnostic labels
    - private relationship details
